services:
  db:
    image: postgres:16-alpine
    container_name: faraday-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: faraday
      POSTGRES_PASSWORD: faraday
      POSTGRES_DB: faraday
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: faraday-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: faraday
      POSTGRES_PASSWORD: faraday
      POSTGRES_DB: faraday
      DJANGO_DEBUG: "true"
    depends_on:
      - db
    volumes:
      - ./backend:/app

volumes:
  pgdata:
