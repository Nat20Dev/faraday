version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: faraday-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: faraday
      POSTGRES_PASSWORD: faraday
      POSTGRES_DB: faraday
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
